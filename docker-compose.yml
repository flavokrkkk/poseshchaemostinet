services:
  postgres:
    image: postgres:16-alpine
    container_name: posnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-posnet}
      POSTGRES_USER: ${POSTGRES_USER:-posnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-posnet_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: posnet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APPLICATION_PORT: ${APPLICATION_PORT:-8000}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-posnet}:${POSTGRES_PASSWORD:-posnet_password}@postgres:5432/${POSTGRES_DB:-posnet}?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      JWT_ACCESS_TOKEN_TIME: ${JWT_ACCESS_TOKEN_TIME:-15m}
      JWT_REFRESH_TOKEN_TIME: ${JWT_REFRESH_TOKEN_TIME:-7d}
      UNIVERSITY_API_URL: ${UNIVERSITY_API_URL:-https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/party}
      UNIVERSITY_API_KEY: ${UNIVERSITY_API_KEY:-Token local-dev-placeholder}
      SUPABASE_URL: ${SUPABASE_URL:-https://example.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-local-dev-placeholder}
    ports:
      - "${APPLICATION_PORT:-8000}:${APPLICATION_PORT:-8000}"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/}
    container_name: posnet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
