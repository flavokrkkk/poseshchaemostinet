name: Deploy to Timeweb VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.deploy_status.outputs.result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH
        id: ssh_deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd poseshchaemostinet-backend/frontend
            git pull origin master
            cd ..
            docker compose up -d --build

      - name: Get current time
        id: date_time
        run: |
          echo "value=$(date '+%H:%M, %d %b %Y')" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit_msg
        run: |
          msg=$(git log -1 --pretty=%B | head -c 50)
          echo "value=$msg..." >> $GITHUB_OUTPUT

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d message_thread_id=${{ secrets.TOPIC_ID }} \
            -d parse_mode="HTML" \
            -d text="<b>✅ Деплой прошёл успешно!</b>

          📦 <b>Проект:</b> <code>${{ github.repository }}</code>
          🧩 <b>Ветка:</b> <code>${{ github.ref_name }}</code>
          🧑‍💻 <b>Автор:</b> @${{ github.actor }}
          📌 <b>Коммит:</b> <a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>${{ github.sha }}</a>
          💬 <b>Сообщение:</b> <i>${{ steps.commit_msg.outputs.value }}</i>

          ⏱️ <b>Время:</b> ${{ steps.date_time.outputs.value }}

          🌐 <b>Сайт доступен:</b>
            <a href='https://посещаемости.net/'>https://посещаемости.net/</a>"

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d message_thread_id=${{ secrets.TOPIC_ID }} \
            -d parse_mode="HTML" \
            -d text="<b>❌ Деплой НЕ УДАЛСЯ!</b>

          📦 <b>Проект:</b> <code>${{ github.repository }}</code>
          🧩 <b>Ветка:</b> <code>${{ github.ref_name }}</code>
          🧑‍💻 <b>Автор:</b> @${{ github.actor }}
          📌 <b>Коммит:</b> <a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>${{ github.sha }}</a>
          💬 <b>Сообщение:</b> <i>${{ steps.commit_msg.outputs.value }}</i>

          ⏱️ <b>Время:</b> ${{ steps.date_time.outputs.value }}

          🔔 <b>Внимание:</b> @egoryaaa @magoxdd @BeforeAdmin

          🔗 <b>Посмотреть логи:</b>
          <a href='${{ github.server_url }}/${{ github.repository }}/actions'>GitHub Actions</a>

          🌐 <b>Сайт:</b>
            <a href='https://посещаемости.net/'>https://посещаемости.net/</a>

          🚨 Требуется срочное вмешательство."
